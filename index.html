<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 큐챔스 X ZOWIE 알려존 퀴즈</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #0d0d0d; color: #FFFFFF; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; overflow-x: hidden; }
        
        .page { display: none; width: 100%; max-width: 500px; padding: 24px; text-align: center; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 글래스모피즘 카드 컨테이너 */
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; }

        /* 타이틀 & 텍스트 스타일 */
        .main-title { font-size: 32px; font-weight: 800; color: #FFFFFF; line-height: 1.3; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub-title { font-size: 15px; color: #BBBBBB; font-weight: 400; margin-bottom: 32px; }
        
        /* 버튼 공통 스타일 */
        .btn-main { background: #BA0C2F; color: #FFFFFF; font-weight: 700; border: none; padding: 20px; border-radius: 16px; cursor: pointer; width: 100%; font-size: 18px; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(186, 12, 47, 0.3); }
        .btn-main:hover { background: #E0123A; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(186, 12, 47, 0.5); }

        /* 뒤로가기 버튼 스타일 */
        .btn-prev { background: transparent; border: 1px solid rgba(255, 255, 255, 0.25); color: #CCCCCC; padding: 14px 24px; border-radius: 12px; cursor: pointer; font-size: 15px; display: block; margin: 24px auto 0 auto; transition: all 0.2s; width: fit-content; }
        .btn-prev:hover { color: #FFFFFF; border-color: rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.05); }

        /* 성별 선택 스타일 */
        .gender-container { display: flex; gap: 16px; margin: 32px 0; justify-content: center; }
        .gender-card { flex: 1; background: rgba(255, 255, 255, 0.04); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 24px 12px; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.25s ease; color: #DDDDDD; }
        .gender-card:hover { border-color: #BA0C2F; background: rgba(186, 12, 47, 0.08); box-shadow: 0 0 20px rgba(186, 12, 47, 0.3); color: #FFFFFF; }
        .gender-card.selected { border-color: #7BFD57; background: rgba(123, 253, 87, 0.1); box-shadow: 0 0 20px rgba(123, 253, 87, 0.3); color: #FFFFFF; }

        /* 프로그레스 바 */
        .progress-container { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; margin-bottom: 32px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #BA0C2F; border-radius: 3px; transition: width 0.3s ease; box-shadow: 0 0 8px #BA0C2F; }

        /* 퀴즈 문항 스타일 */
        .q-num { color: #7BFD57; font-size: 16px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; text-align: left; }
        .q-text { font-size: 22px; font-weight: 800; color: #FFFFFF; line-height: 1.45; text-align: left; margin-bottom: 12px; word-break: keep-all; }
        .q-example { font-size: 14px; font-weight: 400; color: #DDDDDD; background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border-left: 3px solid rgba(255,255,255,0.2); text-align: left; line-height: 1.6; margin-bottom: 28px; white-space: pre-line; word-break: keep-all; }
        
        /* 퀴즈 선택지 버튼 */
        .options-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.15); padding: 18px 20px; border-radius: 14px; color: #FFFFFF; text-align: left; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); line-height: 1.4; word-break: keep-all; }
        .option-btn:hover { border-color: #BA0C2F !important; background: rgba(186, 12, 47, 0.12) !important; box-shadow: 0 0 20px rgba(186, 12, 47, 0.4) !important; transform: translateX(2px); }

        /* 결과 화면 스타일 */
        .score-large { font-size: 64px; font-weight: 900; color: #7BFD57; margin: 16px 0 32px 0; letter-spacing: -1px; }
        .review-wrapper { display: flex; flex-direction: column; gap: 16px; text-align: left; margin-top: 24px; }
        .review-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 20px; }
        .review-card.correct { border-left: 4px solid #7BFD57; }
        .review-card.incorrect { border-left: 4px solid #BA0C2F; }
        .review-status { font-size: 14px; font-weight: 800; margin-bottom: 6px; }
        .review-card.correct .review-status { color: #7BFD57; }
        .review-card.incorrect .review-status { color: #BA0C2F; }
        .review-q { font-size: 16px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; line-height: 1.4; }
        .review-ans { font-size: 14px; color: #BBBBBB; margin-bottom: 8px; }
        .review-ans span { color: #FFF; font-weight: bold; }
        .review-expl { font-size: 13px; color: #999999; line-height: 1.5; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 8px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="container">
            <h1 class="main-title" style="font-weight: 800;">ZOWIE ZONE 알려존 이벤트</h1>
            <p class="sub-title" style="font-size: 14px; color: #999999; font-weight: 400;">오프라인 현장 이벤트</p>
            <button class="btn-main" onclick="startTest()">이벤트 참여하기</button>
        </div>
    </div>

    <div id="gender-page" class="page">
        <div class="container">
            <h2 class="main-title" style="font-size: 24px; font-weight: 800;">성별을 선택해주세요</h2>
            <p class="sub-title" style="font-size: 14px; color: #999999; margin-bottom: 16px;">통계 집계를 위해 사용됩니다.</p>
            <div class="gender-container">
                <div id="gender-m" class="gender-card" onclick="selectGender('male')">👦 남성</div>
                <div id="gender-f" class="gender-card" onclick="selectGender('female')">👧 여성</div>
            </div>
            <button class="btn-main" onclick="goToQuestion()">퀴즈 시작하기</button>
            <button class="btn-prev" onclick="showPage('home-page')">이전으로</button>
        </div>
    </div>

    <div id="question-page" class="page">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="container">
            <div id="q-number" class="q-num"></div>
            <div id="q-text" class="q-text"></div>
            <div id="q-example" class="q-example"></div>
            <div id="options-wrapper" class="options-wrapper"></div>
            <button class="btn-prev" onclick="prevQuestion()">이전 문제로</button>
        </div>
    </div>

    <div id="result-page" class="page">
        <div class="container">
            <h2 class="main-title" style="font-size: 24px; font-weight: 800;">퀴즈 완료!</h2>
            <p class="sub-title" style="margin-bottom: 8px;">당신의 최종 점수는?</p>
            <div id="score-text" class="score-large"></div>
            <button class="btn-main" onclick="resetAll()">처음으로 돌아가기</button>
            
            <div class="review-wrapper" id="review-wrapper">
                </div>
        </div>
    </div>

    <script>
        // 퀴즈 문항 데이터셋 구성
        const questions = [
            {
                q: "이번 '2026 큐챔스' 오프라인 본선이 치러지는 장소이자, 벤큐 조위(ZOWIE)의 프로급 프리미엄 게이밍 기어 라인업을 직접 체험할 수 있도록 구축된 이 전용 좌석 공간의 이름은 무엇일까요?",
                example: "예시)\n이벤트가 진행되고 있는 공간의 명칭을 골라주세요.",
                options: ["① 벤큐 랜드", "② 조위존 (ZOWIE ZONE)", "③ 큐브 스튜디오", "④ 옵티멈 스페이스"],
                answer: 1, // ② 조위존 (ZOWIE ZONE)
                expl: "벤큐 조위(ZOWIE)의 고사양 게이밍 기어가 세팅된 독점 체험존 명칭은 '조위존(ZOWIE ZONE)'입니다."
            },
            {
                q: "조위(ZOWIE) 게이밍 모니터에 탑재된 독점 기술로, 화면이 격렬하게 전환되는 상황에서도 잔상을 완벽하게 제거하여, 눈으로 볼 때 이미지가 안정적으로 보이도록 돕는 이 기술의 이름은 무엇일까요?",
                example: "예시)\nFPS 게임 등 고속 화면 전환 시 화면 정밀도를 극대화하는 독점 기술입니다.",
                options: ["① DyAc™ (다이악)", "② Acrobatic", "③ Commander", "④ Line Breaker"],
                answer: 0, // ① DyAc™ (다이악)
                expl: "DyAc™(Dynamic Accuracy)는 벤큐 조위만의 독점 잔상 제거 기술로, 화면의 흔들림을 줄여 정밀한 조준을 돕습니다."
            },
            {
                q: "현재 이용 중이신 조위존 2인실에 장착되어 있는 장비로, 최고급 오디오 칩셋을 통해 일반 PC와는 차원이 다른 풍부하고 디테일한 하이엔드 입체 사운드를 만끽할 수 있도록 돕는 사운드카드의 명칭은 무엇일까요?",
                example: "예시)\n풍부한 사운드 밸런스와 하이엔드 입체 음향을 출력해 주는 외장 사운드 하드웨어입니다.",
                options: ["① 사운드 블라스터 (Sound Blaster)", "② 조위 오디오", "③ 큐챔스 볼륨", "④ 벤큐 사운드"],
                answer: 0, // ① 사운드 블라스터 (Sound Blaster)
                expl: "조위존 2인실에는 최상급 사운드 플레이를 위해 최고급 오디오 칩셋 사운드 블라스터 외장 사운드카드가 세팅되어 있습니다."
            }
        ];

        // 상태 변수 정의
        let _supabase = null;
        let userGender = "";
        let currentIdx = 0;
        let userAnswers = []; // 사용자가 선택한 정답 인덱스 기록 리스트

        // 수파베이스 안전 초기화
        window.addEventListener('DOMContentLoaded', () => {
            try {
                const SUPABASE_URL = "https://qaiujvaydoowubvnvace.supabase.co";
                const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhaXVqdmF5ZG9vd3Vidm52YWNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM6NjY4ODcsImV4cCI6MjA5OTI0Mjg4N30.28DGW23cGI3ltvhRNhvvLk6SyJzeu2Xct_J81HCA1j0";
                if (typeof supabase !== 'undefined') {
                    _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (e) {
                console.error("수파베이스 초기화 실패:", e.message);
            }
        });

        // 페이지 전환 핸들러
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
            window.scrollTo(0, 0);
        }

        function startTest() {
            showPage('gender-page');
        }

        function selectGender(gender) {
            userGender = gender;
            document.getElementById('gender-m').classList.remove('selected');
            document.getElementById('gender-f').classList.remove('selected');
            if (gender === 'male') document.getElementById('gender-m').classList.add('selected');
            if (gender === 'female') document.getElementById('gender-f').classList.add('selected');
        }

        function goToQuestion() {
            if (!userGender) {
                alert("성별을 선택해주세요!");
                return;
            }
            currentIdx = 0;
            userAnswers = [];
            showPage('question-page');
            renderQuestion();
        }

        // 퀴즈 화면 동적 렌더링
        function renderQuestion() {
            const qData = questions[currentIdx];
            
            // 프로그레스 바 상태 업데이트
            const progressPercent = (currentIdx / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progressPercent + "%";

            // 질문 영역 바인딩
            document.getElementById('q-number').innerText = `QUESTION 0${currentIdx + 1}`;
            document.getElementById('q-text').innerText = qData.q;
            
            // 예시 영역 조건부 처리
            const exBlock = document.getElementById('q-example');
            if (qData.example && qData.example.trim() !== "") {
                exBlock.innerText = qData.example;
                exBlock.style.display = "block";
            } else {
                exBlock.style.display = "none";
            }

            // 선택지 리스트 출력
            const wrapper = document.getElementById('options-wrapper');
            wrapper.innerHTML = "";
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx);
                wrapper.appendChild(btn);
            });
        }

        function selectOption(selectedIdx) {
            userAnswers[currentIdx] = selectedIdx;
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                calculateAndUploadResult();
            }
        }

        // 뒤로가기 (이전 문제 이동) 기능 추가
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            } else {
                showPage('gender-page');
            }
        }

        // 결과 산출 및 데이터 백엔드 전송
        async function calculateAndUploadResult() {
            let correctCount = 0;
            questions.forEach((q, idx) => {
                if (userAnswers[idx] === q.answer) {
                    correctCount++;
                }
            });

            const finalScoreText = `${correctCount} / ${questions.length}`;
            document.getElementById('score-text').innerText = finalScoreText;

            // 오답 노트 빌드
            renderReviewNotes();
            showPage('result-page');

            // 수파베이스 테이블 데이터 전송 (test_results 형식 호환 유지)
            if (_supabase) {
                try {
                    const korGender = userGender === 'male' ? '남성' : '여성';
                    await _supabase.from('test_results').insert([
                        { gender: korGender, result_type: finalScoreText }
                    ]);
                } catch (err) {
                    console.error("데이터 서버 전송 에러:", err.message);
                }
            }
        }

        // 오답노트 UI 렌더링
        function renderReviewNotes() {
            const wrapper = document.getElementById('review-wrapper');
            wrapper.innerHTML = "";

            questions.forEach((q, idx) => {
                const isCorrect = userAnswers[idx] === q.answer;
                const card = document.createElement('div');
                card.className = `review-card ${isCorrect ? 'correct' : 'incorrect'}`;

                card.innerHTML = `
                    <div class="review-status">${isCorrect ? '✓ 정답입니다' : '✗ 오답입니다'}</div>
                    <div class="review-q">Q${idx + 1}. ${q.q}</div>
                    <div class="review-ans">내가 고른 답: <span>${q.options[userAnswers[idx]]}</span></div>
                    <div class="review-ans">실제 정답: <span style="color:#7BFD57;">${q.options[q.answer]}</span></div>
                    <div class="review-expl">💡 해설: ${q.expl}</div>
                `;
                wrapper.appendChild(card);
            });
        }

        // 리셋 함수
        function resetAll() {
            userGender = "";
            currentIdx = 0;
            userAnswers = [];
            document.getElementById('gender-m').classList.remove('selected');
            document.getElementById('gender-f').classList.remove('selected');
            document.getElementById('progress-bar').style.width = "0%";
            showPage('home-page');
        }
    </script>
</body>
</html>
