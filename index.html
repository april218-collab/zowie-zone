<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 큐챔스 X ZOWIE 퀴즈</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #0f0f12 0%, #1a1a24 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* ZOWIE Signature Color Variable */
        .text-zowie {
            color: #FF204E; /* 조위 테마 레드 컬러 */
        }

        /* custom styling for option button transitions */
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn:hover {
            background: rgba(255, 32, 78, 0.15);
            border-color: #FF204E;
            transform: translateY(-2px);
        }

        /* Hint section animation */
        .hint-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .hint-content.open {
            max-height: 100px;
            opacity: 1;
            margin-top: 8px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-panel rounded-2xl p-6 min-h-[580px] flex flex-col justify-between relative overflow-hidden">
        
        <div id="intro-page" class="flex-1 flex flex-col justify-between py-6">
            <div class="text-center my-auto space-y-4">
                <h1 class="text-3xl font-extrabold tracking-tight">
                    <span class="text-zowie">ZOWIE</span> ZONE 알려존!
                </h1>
                <p class="text-gray-400 font-light text-sm tracking-wide">오프라인 현장 이벤트</p>
            </div>
            
            <button onclick="startQuiz()" class="w-full bg-[#FF204E] hover:bg-[#d6143c] text-white font-bold py-4 px-6 rounded-xl shadow-lg transform active:scale-95 transition text-center cursor-pointer">
                이벤트 참여하기
            </button>
        </div>

        <div id="quiz-page" class="hidden flex-1 flex flex-col justify-between">
            <div>
                <div class="mb-6">
                    <div class="text-center text-xs font-medium text-gray-400 mb-2 tracking-wider">
                        큐챔스 x <span class="text-zowie font-bold">ZOWIE</span> 퀴즈
                    </div>
                    <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-[#FF204E] h-full transition-all duration-300" style="width: 33.3%;"></div>
                    </div>
                </div>

                <div class="my-4">
                    <span class="text-xs font-bold text-[#FF204E] uppercase tracking-widest bg-[#FF204E]/10 px-2.5 py-1 rounded-md" id="question-number">Q1</span>
                    <h2 class="text-xl font-bold mt-3 leading-snug word-break" id="question-text">
                        질문 로딩중...
                    </h2>
                </div>

                <div class="mb-6 bg-white/5 rounded-xl p-3 border border-white/5">
                    <button onclick="toggleHint()" id="hint-toggle-btn" class="text-xs text-gray-400 hover:text-white flex items-center justify-between w-full focus:outline-none cursor-pointer">
                        <span>💡 힌트 가 숨겨져 있습니다. (클릭해서 보기)</span>
                        <span id="hint-icon" class="transition-transform duration-200">▼</span>
                    </button>
                    <div id="hint-container" class="hint-content text-sm text-gray-300 pl-1 font-light leading-relaxed">
                        힌트 내용
                    </div>
                </div>

                <div class="space-y-3" id="options-container">
                    </div>
            </div>

            <div class="mt-6 pt-4 border-t border-white/5 flex justify-center">
                <button onclick="prevQuestion()" class="text-xs text-gray-400 hover:text-white flex items-center gap-1.5 transition px-4 py-2 rounded-lg hover:bg-white/5 cursor-pointer">
                    ⬅️ 이전 문제로
                </button>
            </div>
        </div>

        <div id="result-page" class="hidden flex-1 flex flex-col justify-between py-4">
            <div class="text-center my-auto space-y-6">
                <div class="inline-flex p-4 bg-[#FF204E]/10 rounded-full text-[#FF204E] text-4xl mb-2 animate-bounce">
                    🏆
                </div>
                <h2 class="text-2xl font-bold">퀴즈 완료!</h2>
                
                <div class="bg-white/5 rounded-2xl p-6 border border-white/10">
                    <p class="text-gray-400 text-sm">당신의 최종 점수는?</p>
                    <p class="text-4xl font-extrabold text-[#FF204E] mt-2" id="score-text">0 / 3</p>
                </div>
                
                <p class="text-sm text-gray-400 px-4">
                    축하합니다! 화면을 현장 스태프에게 인증하고 경품을 수령하세요.
                </p>
            </div>

            <button onclick="resetQuiz()" class="w-full bg-white/10 hover:bg-white/10 text-white font-medium py-3.5 px-6 rounded-xl border border-white/10 transition text-center cursor-pointer">
                처음으로 돌아가기
            </button>
        </div>

    </div>

    <script>
        // --- 1. 수파베이스 (Supabase) 설정 정보 고정 ---
        const SUPABASE_URL = "https://qaiujvaydoowubvnvace.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhaXVqdmayZG9vd3Vidm52YWNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NjY4ODcsImV4cCI6MjA5OTI0Mjg4N30.28DGW23cGI3ltvhRNhvvLk6SyJzeu2Xct_J81HCA1j0";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. 퀴즈 문항 데이터셋 (힌트 및 ZOWIE 컬러 하이라이트 반영) ---
        // 'ZOWIE' 텍스트 부분만 조위 레드 컬러를 바인딩하기 위해 렌더링 시점에 가공 처리합니다.
        const questions = [
            {
                q: "이번 '2026 큐챔스' 오프라인 본선이 치러지는 장소이자, 벤큐 조위(ZOWIE)의 프로급 프리미엄 게이밍 기어 라인업을 직접 체험할 수 있도록 구축된 이 전용 좌석 공간의 이름은 무엇일까요?",
                hint: "영어 알파벳 대문자로 구성된 전용 구역 공간의 이름이며, ZOWIE ZONE 이라는 수식어가 붙습니다.",
                options: [
                    { text: "① 벤큐 랜드", score: 0 },
                    { text: "② 조위존 (ZOWIE ZONE)", score: 1 },
                    { text: "③ 큐브 스튜디오", score: 0 },
                    { text: "④ 옵티멈 스페이스", score: 0 }
                ]
            },
            {
                q: "조위(ZOWIE) 게이밍 모니터에 탑재된 독점 기술로, 화면이 격렬하게 전환되는 상황에서도 잔상을 완벽하게 제거하여, 눈으로 볼 때 이미지가 안정적으로 보이도록 돕는 이 기술의 이름은 무엇일까요?",
                hint: "영어 알파벳 4글자로 구성되어 있으며, 다이악(DyAc)이라고 발음합니다.",
                options: [
                    { text: "① DyAc™ (다이악)", score: 1 },
                    { text: "② Acrobatic", score: 0 },
                    { text: "③ Commander", score: 0 },
                    { text: "④ Line Breaker", score: 0 }
                ]
            },
            {
                q: "현재 이용 중이신 조위존 2인실에 장착되어 있는 장비로, 최고급 오디오 칩셋을 통해 일반 PC와는 차원이 다른 풍부하고 디테일한 하이엔드 입체 사운드를 만끽할 수 있도록 돕는 사운드카드의 명칭은 무엇일까요?",
                hint: "PC 주변기기가 아닌 사운드 명가 혹은 조위 자체 오디오 라인업과 구별되는 외장형 하드웨어 장치 이름입니다.",
                options: [
                    { text: "① 사운드 블라스터 (Sound Blaster)", score: 1 },
                    { text: "② 조위 오디오", score: 0 },
                    { text: "③ 큐챔스 볼륨", score: 0 },
                    { text: "④ 벤큐 사운드", score: 0 }
                ]
            }
        ];

        // --- 3. 상태 제어 변수 ---
        let currentIdx = 0;
        let userAnswers = []; // 각 문항별 유저가 획득한 스코어 저장 배열

        // --- 4. 텍스트 바인딩 시 ZOWIE 단어 색상 변환 함수 ---
        function formatZowieText(text) {
            // '퀴즈'라는 글자 뒤에 오는 경우가 아닌 순수 'ZOWIE' 또는 '조위' 영단어들을 하이라이트 처리
            return text.replace(/ZOWIE/g, '<span class="text-zowie font-extrabold">ZOWIE</span>');
        }

        // --- 5. 화면 전환 함수 ---
        function startQuiz() {
            document.getElementById('intro-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            currentIdx = 0;
            userAnswers = [];
            renderQuestion();
        }

        function toggleHint(forceClose = false) {
            const hintContainer = document.getElementById('hint-container');
            const hintIcon = document.getElementById('hint-icon');
            const toggleBtn = document.getElementById('hint-toggle-btn');

            if (hintContainer.classList.contains('open') || forceClose) {
                hintContainer.classList.remove('open');
                hintIcon.style.transform = 'rotate(0deg)';
                toggleBtn.querySelector('span').innerText = '💡 힌트 가 숨겨져 있습니다. (클릭해서 보기)';
            } else {
                hintContainer.classList.add('open');
                hintIcon.style.transform = 'rotate(180deg)';
                toggleBtn.querySelector('span').innerText = '💡 힌트 내용을 확인 중입니다.';
            }
        }

        // --- 6. 문제 렌더링 함수 ---
        function renderQuestion() {
            // 무조건 새 문제를 불러올 때는 힌트 창을 닫아둔 상태로 세팅
            toggleHint(true);

            const currentQuestion = questions[currentIdx];
            
            // 상단 진행도 프로그레스 바 계산
            const progressPercent = ((currentIdx + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            
            // 문제 번호 및 텍스트 적용 (ZOWIE 영단어 컬러 가공 포함)
            document.getElementById('question-number').innerText = `Q${currentIdx + 1}`;
            document.getElementById('question-text').innerHTML = formatZowieText(currentQuestion.q);
            document.getElementById('hint-container').innerHTML = formatZowieText(currentQuestion.hint);
            
            // 선택지 구성
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left option-btn p-4 rounded-xl text-sm font-medium cursor-pointer flex items-center justify-between";
                btn.innerHTML = `<span>${formatZowieText(opt.text)}</span> <span class="text-white/20 text-xs">➔</span>`;
                btn.onclick = () => selectOption(opt.score);
                optionsContainer.appendChild(btn);
            });
        }

        // --- 7. 보기 선택 및 스코어 누적 함수 ---
        function selectOption(score) {
            userAnswers[currentIdx] = score; // 해당 인덱스에 점수 저장
            
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                submitFinalResults();
            }
        }

        // --- 8. 이전 문제로 가기 (뒤로가기 핵심 기능) ---
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            } else {
                // 1번 문항에서 뒤로가기를 누를 경우 인트로(랜딩) 페이지로 복귀
                document.getElementById('quiz-page').classList.add('hidden');
                document.getElementById('intro-page').classList.remove('hidden');
            }
        }

        // --- 9. 결과 제출 및 Supabase 데이터 적재 ---
        async function submitFinalResults() {
            // 총점 연산
            const totalScore = userAnswers.reduce((acc, curr) => acc + curr, 0);
            const scoreString = `${totalScore} / ${questions.length}`;
            
            document.getElementById('score-text').innerText = scoreString;
            
            // 화면 UI 결과창으로 전환
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            
            // 수파베이스 데이터베이스 'test_results' 테이블 인서트 트랜잭션 수행
            try {
                const { data, error } = await _supabase
                    .from('test_results')
                    .insert([
                        { 
                            result_type: scoreString,
                            created_at: new Date().toISOString()
                        }
                    ]);
                if (error) throw error;
                console.log("데이터가 성공적으로 수파베이스에 적재되었습니다.", data);
            } catch (err) {
                console.error("데이터 적재 실패:", err.message);
            }
        }

        // --- 10. 처음으로 돌아가기 (초기화) ---
        function resetQuiz() {
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('intro-page').classList.remove('hidden');
            currentIdx = 0;
            userAnswers = [];
        }
    </script>
</body>
</html>
