<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 큐챔스 X ZOWIE 퀴즈 이벤트</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        
        /* 홈 메인 랜딩 스타일 */
        .intro-title-bold {
            font-size: 34px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .intro-desc-thin {
            font-size: 16px;
            font-weight: 300;
            color: #cccccc;
            margin-bottom: 40px;
        }
        
        /* 공통 메인 액션 버튼 */
        .btn-action {
            background: #BA0C2F;
            color: #ffffff;
            font-weight: bold;
            border: none;
            padding: 18px 32px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(186, 12, 47, 0.4);
        }
        .btn-action:hover {
            background: #e6123e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(186, 12, 47, 0.6);
        }

        /* 성별 선택 카드 UI */
        .gender-container {
            display: flex;
            gap: 20px;
            margin: 30px 0 40px 0;
            justify-content: center;
        }
        .gender-option {
            width: 150px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        /* 마우스 호버 시 조위 시그니처 레드 은은한 광채 효과 */
        .gender-option:hover {
            border-color: #BA0C2F;
            background: rgba(186, 12, 47, 0.08);
            box-shadow: 0 0 20px rgba(186, 12, 47, 0.5);
        }
        .gender-option.selected {
            border-color: #7BFD57;
            background: rgba(123, 253, 87, 0.1);
            box-shadow: 0 0 20px rgba(123, 253, 87, 0.3);
        }
        
        /* 퀴즈 문제 및 선택지 스타일 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 35px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #BA0C2F;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #7BFD57;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 21px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 35px;
            word-break: keep-all;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 18px 20px;
            border-radius: 14px;
            color: #ffffff;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            line-height: 1.4;
        }
        /* 마우스 호버 시 조위 시그니처 레드 은은한 광채 효과 */
        .option-btn:hover {
            border-color: #BA0C2F;
            background: rgba(186, 12, 47, 0.08);
            box-shadow: 0 0 20px rgba(186, 12, 47, 0.5);
        }
        
        /* 결과 레포트 오답노트 디자인 */
        .score-display {
            font-size: 64px;
            font-weight: 900;
            color: #7BFD57;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 25px;
        }
        .feedback-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            border-left: 4px solid #BA0C2F;
        }
        .feedback-q {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 6px;
            word-break: keep-all;
        }
        .feedback-status {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .feedback-status.correct { color: #7BFD57; }
        .feedback-status.incorrect { color: #BA0C2F; }
        .feedback-expl {
            font-size: 13px;
            color: #cccccc;
            line-height: 1.5;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="home-page" class="page active">
            <h1 class="intro-title-bold">ZOWIE ZONE 알려존 이벤트</h1>
            <p class="intro-desc-thin">오프라인 현장이벤트</p>
            <button class="btn-action" onclick="showPage('gender-page')">시작하기</button>
        </div>

        <div id="gender-page" class="page">
            <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">성별 선택</h2>
            <p style="color: #ccc; font-size: 15px;">통계 집계를 위해 성별을 선택해 주세요.</p>
            
            <div class="gender-container">
                <div id="gender-m" class="gender-option" onclick="selectGender('male')">👦 남성</div>
                <div id="gender-f" class="gender-option" onclick="selectGender('female')">👧 여성</div>
            </div>

            <button class="btn-action" onclick="goToQuestion()">이벤트 참여하기</button>
        </div>

        <div id="question-page" class="page">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            <div id="question-number" class="question-number"></div>
            <div id="question-text" class="question-text"></div>
            <div id="options" class="options-container"></div>
        </div>

        <div id="result-page" class="page">
            <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 10px;">퀴즈 종료!</h2>
            <div id="score-display" class="score-display">0 / 3</div>
            
            <div id="feedback-list" class="feedback-list"></div>
            
            <button class="btn-action" style="margin-top: 15px;" onclick="resetQuiz()">처음으로 돌아가기</button>
        </div>

    </div>

    <script>
        // 무손실 정답형 퀴즈 데이터 구조 정의
        const quizData = [
            {
                q: "이번 '2026 큐챔스' 오프라인 본선이 치러지는 장소이자, 벤큐 조위(ZOWIE)의 프로급 프리미엄 게이밍 기어 라인업을 직접 체험할 수 있도록 구축된 이 전용 좌석 공간의 이름은 무엇일까요?",
                options: ["벤큐 랜드", "조위존 (ZOWIE ZONE)", "큐브 스튜디오", "옵티멈 스페이스"],
                answer: 1, 
                expl: "오프라인 본선 현장 내에서 최고의 몰입감을 선사하도록 벤큐 조위 기어로만 구성된 전용 프리미엄 체험 공간의 공식 명칭은 '조위존 (ZOWIE ZONE)' 입니다."
            },
            {
                q: "조위(ZOWIE) 게이밍 모니터에 탑재된 독점 기술로, 화면이 격렬하게 전환되는 상황에서도 잔상을 완벽하게 제거하여, 눈으로 볼 때 이미지가 안정적으로 보이도록 돕는 이 기술의 이름은 무엇일까요?",
                options: ["DyAc™ (다이악)", "Acrobatic", "Commander", "Line Breaker"],
                answer: 0, 
                expl: "DyAc™(Dynamic Accuracy)는 벤큐 조위만의 독점 디스플레이 동적 정확도 향상 기술로, FPS 게임 등의 격렬한 마우스 화면 전환 중 시각적 잔상을 획기적으로 줄여줍니다."
            },
            {
                q: "현재 이용 중이신 조위존 2인실에 장착되어 있는 장비로, 최고급 오디오 칩셋을 통해 일반 PC와는 차원이 다른 풍부하고 디테일한 하이엔드 입체 사운드를 만끽할 수 있도록 돕는 사운드카드의 명칭은 무엇일까요?",
                options: ["사운드 블라스터 (Sound Blaster)", "조위 오디오", "큐챔스 볼륨", "벤큐 사운드"],
                answer: 0, 
                expl: "조위존 2인실에는 글로벌 명품 하이엔드 오디오 칩셋 하드웨어인 '사운드 블라스터 (Sound Blaster)' 외장 사운드카드가 내장되어 있어 폭발적인 공간 음향을 선사합니다."
            }
        ];

        let currentIdx = 0;
        let userAnswers = [];
        let selectedGender = "";
        let _supabase = null;

        // 실시간 전송용 프로젝트 크레덴셜 (입력 완료)
        const SUPABASE_URL = "https://xivbwdmwvsujbbblmoze.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpvbndkbXd2c3VqYmJibG1vemUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc4MzY3MDQ4OSwiZXhwIjoyMDk5MjQ2NDg5fQ.kYmNkDI2CJvgThPRWCUD3Sm8rlzydtwMPtsHLYiEbhE";

        window.addEventListener('DOMContentLoaded', () => {
            try {
                if (typeof supabase !== 'undefined') {
                    _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (e) {
                console.error("Supabase 초기화 에러:", e.message);
            }
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');
            window.scrollTo(0, 0);
        }

        function selectGender(gender) {
            selectedGender = gender;
            document.getElementById('gender-m').classList.remove('selected');
            document.getElementById('gender-f').classList.remove('selected');
            if (gender === 'male') document.getElementById('gender-m').classList.add('selected');
            if (gender === 'female') document.getElementById('gender-f').classList.add('selected');
        }

        function goToQuestion() {
            if (!selectedGender) {
                alert("성별을 먼저 선택해주세요!");
                return;
            }
            currentIdx = 0;
            userAnswers = [];
            showPage('question-page');
            renderQuestion();
        }

        function renderQuestion() {
            const qData = quizData[currentIdx];
            const progressPercent = (currentIdx / quizData.length) * 100;
            document.getElementById('progress').style.width = progressPercent + "%";
            
            document.getElementById('question-number').innerText = "Q" + (currentIdx + 1) + ".";
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = "";
            
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = (idx + 1) + ". " + opt;
                btn.onclick = () => selectOption(idx);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIdx) {
            userAnswers.push(selectedIdx);
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                calculateAndUploadQuizResult();
            }
        }

        async function calculateAndUploadQuizResult() {
            let correctCount = 0;
            quizData.forEach((item, idx) => {
                if (userAnswers[idx] === item.answer) correctCount++;
            });
            
            const scoreString = `${correctCount} / ${quizData.length}`;
            document.getElementById('score-display').innerText = scoreString;
            
            displayDetailedFeedback();
            showPage('result-page');
            
            if (_supabase) {
                try {
                    const korGender = selectedGender === 'male' ? '남성' : '여성';
                    // 수동 세팅 완료하신 테이블 및 컬럼 매칭 (트랜잭션 에러 유발 원인 완전 제거)
                    await _supabase.from('test_results').insert([{ 
                        gender: korGender,
                        result_type: scoreString
                    }]);
                } catch (err) {
                    console.error("데이터 저장 실패:", err.message);
                }
            }
        }

        function displayDetailedFeedback() {
            const listContainer = document.getElementById('feedback-list');
            listContainer.innerHTML = "";
            
            quizData.forEach((item, idx) => {
                const isCorrect = userAnswers[idx] === item.answer;
                
                const card = document.createElement('div');
                card.className = "feedback-card";
                
                const qTitle = document.createElement('div');
                qTitle.className = "feedback-q";
                qTitle.innerText = "Q" + (idx + 1) + ". " + item.q;
                
                const status = document.createElement('div');
                status.className = "feedback-status " + (isCorrect ? "correct" : "incorrect");
                status.innerText = isCorrect ? "▶ 정답입니다! 🎉" : "▶ 오답 (내 선택: " + (userAnswers[idx]+1) + "번 / 정답: " + (item.answer+1) + "번)";
                
                const expl = document.createElement('div');
                expl.className = "feedback-expl";
                expl.innerText = "해설: " + item.expl;
                
                card.appendChild(qTitle);
                card.appendChild(status);
                card.appendChild(expl);
                listContainer.appendChild(card);
            });
        }

        function resetQuiz() {
            selectedGender = "";
            document.getElementById('gender-m').classList.remove('selected');
            document.getElementById('gender-f').classList.remove('selected');
            showPage('home-page');
        }
    </script>
</body>
</html>
